name: Deploy Server with Cloudflare Tunnel

on:
  push:
    branches:
      - api-server
  workflow_dispatch:
    inputs:
      tunnel_token:
        description: 'Cloudflare Tunnel Token'
        required: false

jobs:
  setup-tunnel:
    runs-on: ubuntu-latest
    outputs:
      tunnel_url: ${{ steps.tunnel.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: api-server

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y git tar xz-utils curl

      - name: Start Flask API Server
        run: |
          nohup python app.py > server.log 2>&1 &
          sleep 3
          echo "Server PID: $!"

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Authenticate Cloudflared
        run: |
          mkdir -p ~/.cloudflared
          echo "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" > ~/.cloudflared/token
          chmod 600 ~/.cloudflared/token

      - name: Create Tunnel Configuration
        run: |
          mkdir -p ~/.cloudflared
          cat > ~/.cloudflared/config.yml << 'EOF'
          tunnel: gami-server
          credentials-file: /root/.cloudflared/token
          ingress:
            - hostname: gami-${{ github.run_id }}.trycloudflare.com
              service: http://localhost:5000
            - service: http_status:404
          EOF

      - name: Start Cloudflared Tunnel
        run: |
          nohup cloudflared tunnel --config ~/.cloudflared/config.yml run > tunnel.log 2>&1 &
          sleep 5
          echo "Tunnel started"

      - name: Extract Tunnel URL
        id: tunnel
        run: |
          # Wait for tunnel to establish
          sleep 10
          TUNNEL_URL=$(grep -oP '(?<=https://)[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then
            TUNNEL_URL=$(cloudflared tunnel info gami-server 2>/dev/null | grep -oP 'https://[^ ]*' || echo "https://gami-${{ github.run_id }}.trycloudflare.com")
          fi
          echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "✓ Tunnel URL: $TUNNEL_URL"

      - name: Test API Health Check
        run: |
          sleep 2
          curl -f http://localhost:5000/health || exit 1
          echo "✓ Server health check passed"

      - name: Create Summary
        if: always()
        run: |
          echo "## 🎮 GamiServer Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Local Server**: http://localhost:5000" >> $GITHUB_STEP_SUMMARY
          echo "- **Cloudflare Tunnel URL**: ${{ steps.tunnel.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [API Health](http://localhost:5000/health)" >> $GITHUB_STEP_SUMMARY
          echo "- [Repository List](http://localhost:5000/api/repos)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tunnel Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Created**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: api-server" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: |
            server.log
            tunnel.log
          retention-days: 7

  verify-deployment:
    runs-on: ubuntu-latest
    needs: setup-tunnel
    if: success()
    
    steps:
      - name: Verify Tunnel Access
        run: |
          TUNNEL_URL="${{ needs.setup-tunnel.outputs.tunnel_url }}"
          echo "Verifying tunnel access to: $TUNNEL_URL"
          sleep 3
          curl -f "$TUNNEL_URL/health" && echo "✓ Tunnel is accessible" || echo "⚠ Tunnel may take a moment to be fully available"

      - name: Post Success Notification
        run: |
          echo "✅ GamiServer deployed successfully!"
          echo "🌐 Access your server at: ${{ needs.setup-tunnel.outputs.tunnel_url }}"
