version: '3.8'

services:
  api-server:
    build: .
    container_name: gami-server
    ports:
      - "5000:5000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - FLASK_ENV=production
    volumes:
      - ./gami_server.db:/app/gami_server.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - gami-network

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: gami-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - api-server
    networks:
      - gami-network
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}

networks:
  gami-network:
    driver: bridge
